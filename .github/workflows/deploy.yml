name: Deploy to GitHub Pages

# This workflow ships only the static PWA. Firestore security rules
# (firestore.rules) are deployed manually with `firebase deploy --only
# firestore:rules`. See DEPLOY.md at the repo root for the full
# procedure — skipping that step leaves cloud sync on Firebase's
# default rules and is unsafe for end users.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject Firebase API Key
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          echo "export const firebaseConfig = {
            apiKey: '${FIREBASE_API_KEY}',
            authDomain: 'trasporti-busto-proj.firebaseapp.com',
            projectId: 'trasporti-busto-proj',
            storageBucket: 'trasporti-busto-proj.firebasestorage.app',
            messagingSenderId: '1061930969785',
            appId: '1:1061930969785:web:d391bb0cac468b76fc0968',
            measurementId: 'G-VKYKDRZ0YQ'
          };" > js/firebase-config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


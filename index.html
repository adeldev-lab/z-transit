<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#101828">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Orari e coincidenze bus nella zona ovest Milano.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://unpkg.com https://apis.google.com https://www.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src https://accounts.google.com https://*.firebaseapp.com;">
  <title>Z-Transit – Trasporti LIVE</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="./css/style.css">
  <script>
    // Apply theme before first paint to avoid flash.
    // Default is the original dark theme; light is opt-in via the toggle only.
    (function() {
      var saved = localStorage.getItem('trasporti_theme');
      var theme = 'dark';
      if (saved === 'light') {
        theme = 'light';
      } else if (saved === 'dark') {
        theme = 'dark';
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        theme = 'light';
      }
      document.documentElement.setAttribute('data-theme', theme);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'light' ? '#f8fafc' : '#101828');
    })();
  </script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <!-- <p class="app-kicker">Via ...</p> -->
        <h1>Z-Transit</h1>
      </div>
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="sync-pill" id="sync-pill" title="Stato Sincronizzazione" aria-live="polite">
          <svg class="sync-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 10h-.01M17 14h.01M13 6h.01M12 10h.01M11 14h.01M7 18h.01M6 6h.01M5 10h.01M4 14h.01"></path><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          <span id="sync-status-text">Inizializzazione...</span>
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Passa al tema chiaro" title="Cambia tema">
          <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg><span style="display: none;">☀️</span>
        </button>
        <div class="clock-card" aria-live="polite">
          <span id="clock-time">--:--</span>
          <small id="clock-date">--</small>
        </div>
      </div>
    </header>

    <nav class="tab-bar" role="tablist" aria-label="Sezioni principali">
      <button class="tab-btn active" id="tab-btn-live" role="tab" aria-selected="true" aria-controls="tab-live" type="button" data-tab="live">LIVE</button>
      <button class="tab-btn" id="tab-btn-timetable" role="tab" aria-selected="false" aria-controls="tab-timetable" type="button" data-tab="timetable">Orari</button>
      <button class="tab-btn" id="tab-btn-trains" role="tab" aria-selected="false" aria-controls="tab-trains" type="button" data-tab="trains">Treni</button>
      <button class="tab-btn" id="tab-btn-alerts" role="tab" aria-selected="false" aria-controls="tab-alerts" type="button" data-tab="alerts">Avvisi</button>
      <button class="tab-btn" id="tab-btn-settings" role="tab" aria-selected="false" aria-controls="tab-settings" type="button" data-tab="settings">Impostazioni</button>
    </nav>

    <main class="content-area">
      <section id="tab-live" class="tab-panel active" role="tabpanel" aria-labelledby="tab-btn-live">
        <div id="live-content" class="stack">
          <div class="empty-state">Caricamento...</div>
        </div>
      </section>

      <section id="tab-timetable" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-timetable">
        <div id="timetable-content" class="stack">
          <div class="empty-state">Seleziona una linea</div>
        </div>
      </section>

      <section id="tab-trains" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-trains">
        <div id="trains-content" class="stack">
          <div class="empty-state">Caricamento orari treni...</div>
        </div>
      </section>

      <section id="tab-alerts" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-alerts">
        <div id="alerts-content" class="stack">
          <div class="empty-state">Caricamento avvisi...</div>
        </div>
      </section>

      <section id="tab-settings" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-settings">
        <div id="settings-content" class="stack"></div>
      </section>
    </main>
    
    <!-- Mappa Floating Button -->
    <button class="map-fab" id="map-fab" type="button" aria-label="Apri mappa delle fermate">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="map-icon" aria-hidden="true" style="vertical-align: middle; margin-right: 4px;"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
      <span>Mappa</span>
    </button>

    <!-- Overlay Mappa -->
    <div class="map-overlay" id="map-overlay" aria-hidden="true">
      <div class="map-header">
        <div>
          <h2>Mappa Fermate</h2>
        </div>
        <button type="button" id="map-close" aria-label="Chiudi mappa">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="map-container"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Firebase SDK (compat) – Auth + Firestore -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script type="module" src="./js/main.js"></script>
  <script>
    // Force service worker update check on every page load.
    // This breaks the stale-cache deadlock: even if the old cache-first SW
    // is serving an outdated main.js, this inline snippet runs fresh from
    // the network (since the browser always re-fetches the HTML navigation
    // request) and triggers the SW byte-check immediately.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (reg) reg.update();
      });
    }
  </script>
</body>
</html>
